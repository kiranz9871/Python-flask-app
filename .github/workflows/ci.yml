name: Flask CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ github.sha }} .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ github.sha }}

    - name: Update Helm Chart Image Tag
      run: |
        sed -i "s/tag:.*/tag: ${GITHUB_SHA}/" flask-chart/values.yaml

    - name: Commit Updated Helm Values
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "github-actions"

        git add flask-chart/values.yaml
        git commit -m "Updated image tag to ${GITHUB_SHA}" || echo "No changes"

    - name: Push Updated Helm Values
      run: |
        git push